- rule_id: occupancy
  feature: Occupancy
  category: performance-model
  status: restricted
  action: manual_implementation
  workaround: For cudaOccupancyMaxActiveBlocksPerMultiprocessor, do not hard-code the local CANN installation path; include <simt/acl/occupancy/acl_occupancy_query.h> through the project's normal CANN/SIMT include configuration when aclOccupancyMaxActiveBlocksPerVectorCoreFromDevice is available; otherwise record the missing header or replacement and use a documented fixed launch policy, measured tuning table, or conservative launch bound.
  note: CUDA occupancy semantics are not one-to-one with Ascend vector-core occupancy. Record semantic differences and occupancy header lookup evidence before deciding fallback.
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-28'

