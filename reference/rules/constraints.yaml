- rule_id: jit-paths
  feature: native JIT-related compilation or loading paths
  category: compilation
  status: unsupported
  action: remove_and_record
  workaround: ''
  note: Unsupported removable subpath. Remove native JIT compilation, runtime compilation, extension JIT loading, or other on-the-fly native-code compilation/loading paths from the migrated result and record the removal in plan.md. Do not classify torch.library.register_fake, FakeTensor/meta kernels, or Python wrapper code kept only for torch.compile compatibility as native JIT unless it compiles or loads native code at runtime.
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-20'

- rule_id: complex-dtype
  feature: complex dtype in migrated results
  category: data-type
  status: unsupported
  action: remove_and_record
  workaround: ''
  note: Unsupported removable dtype subpath. For torch migration work, detect complex dtype branches explicitly, do not migrate complex dtype code paths, and record the exclusion in plan.md. If no supported non-complex behavior remains, block the migration.
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-20'

- rule_id: double-in-kernel
  feature: device-side double paths in one-to-one migration
  category: data-type
  status: unsupported
  action: remove_and_record
  workaround: ''
  note: Unsupported removable dtype subpath. Detect double dtype dispatch branches, double tensor checks, double kernel overloads, double device helpers, FP64 intrinsics, and double validation cases; exclude those paths from implementation and validation in one-to-one migration. Host-side double scalar parameters may remain only when they are not a device-side double execution path. If no supported non-double behavior remains, block the migration.
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-28'

- rule_id: device-std-namespace
  feature: 'device-side std:: usage'
  category: data-type
  status: restricted
  action: manual_implementation
  workaround: Use CMake package discovery with find_package(simt_stl CONFIG REQUIRED) and link the target with simt::std before using simt::std replacements; if no matching replacement exists, record the missing symbol and avoid it with a narrow local helper, direct language construct, or host-side precomputation.
  note: 'Device-side std:: usage must not be silently preserved when unsupported by Ascend SIMT compilation.'
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-28'

- rule_id: cpp-suffix-asc-build
  feature: .cpp source files compiled as Ascend code
  category: build
  status: restricted
  action: manual_implementation
  workaround: Set CMake source-file properties so the .cpp file is compiled as ASC language.
  note: Use source-file language override in CMake when Ascend code is stored in .cpp files.
  source:
    - reference/constraints.md
  reviewed_by: human
  reviewed_at: '2026-04-06'

- rule_id: kernel-struct-by-value
  feature: user-defined struct passed by value to __global__ kernel parameters
  category: compilation
  status: restricted
  action: manual_implementation
  workaround: Avoid passing multi-field user-defined structs by value to __global__ kernels. Prefer splitting the fields into scalar kernel parameters, or construct the struct locally inside the kernel from scalar inputs.
  note: Current bisheng SIMT compilation may crash during instruction selection when a __global__ kernel takes a multi-field user-defined struct parameter by value, even when the same fields compile successfully as separate scalar parameters.
  source:
    - reference/constraints.md
  reviewed_by: agent
  reviewed_at: '2026-04-29'
