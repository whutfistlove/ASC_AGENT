# ---------------------------------------------------------------------------
# CCCL (libcudacxx) -> ASC-STL 头文件层「符号 / 宏 / 命名空间 / 路径」映射知识库。
#
# 这是本项目所在层级（C++ 标准库头文件）的可审计映射，schema 风格对齐官方
# reference/schema.md。官方 api-mapping/ 是 runtime/device 层（cudaMalloc 等），
# 与本层不同级，仅作跨层参考；本文件才是 header 迁移真正会查的表。
#
# 维护约定（沿用官方）：本文件是 source of truth；每条记录保留 source / reviewed_by /
# reviewed_at。always_inject=true 的记录对每个头都适用，会被注入到改写提示词里。
# ---------------------------------------------------------------------------
_meta:
  layer: header
  description: "CCCL libcudacxx -> ASC-STL symbol/macro/namespace/path mapping"
  reviewed_at: "2026-06-15"

# 符号 / 宏 / 命名空间映射。字段：
#   cccl/asc   : 源 / 目标写法（asc 为 "(删除)" 表示该构造在 ASC-STL 中移除）
#   kind       : namespace-macro | fn-qualifier | qualified-name | include-form | guard | drop
#   status     : mapped | removed | partial
#   always_inject : true 则对每个头都注入提示词（命名空间/修饰符这类通用规则）
symbols:
  - cccl: "_CCCL_BEGIN_NAMESPACE_CUDA_STD"
    asc: "_ASC_STD_BEGIN"
    kind: namespace-macro
    status: mapped
    always_inject: true
    note: "命名空间起始宏"
    source: ["examples/headers/max.accl.h", "examples/headers/os.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "_CCCL_END_NAMESPACE_CUDA_STD"
    asc: "_ASC_STD_END"
    kind: namespace-macro
    status: mapped
    always_inject: true
    note: "命名空间结束宏"
    source: ["examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "_LIBCUDACXX_BEGIN_NAMESPACE_STD"
    asc: "_ASC_STD_BEGIN"
    kind: namespace-macro
    status: mapped
    always_inject: true
    note: "libcudacxx 较新/局部头常用的 std 命名空间起始宏；ASC-STL 统一使用 _ASC_STD_BEGIN"
    source: ["examples/headers/sort3.cccl.h", "examples/headers/sort3.accl.h", "examples/headers/quad_fanout.cccl.h", "examples/headers/quad_fanout.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - cccl: "_LIBCUDACXX_END_NAMESPACE_STD"
    asc: "_ASC_STD_END"
    kind: namespace-macro
    status: mapped
    always_inject: true
    note: "libcudacxx 较新/局部头常用的 std 命名空间结束宏；ASC-STL 统一使用 _ASC_STD_END"
    source: ["examples/headers/sort3.cccl.h", "examples/headers/sort3.accl.h", "examples/headers/quad_fanout.cccl.h", "examples/headers/quad_fanout.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - cccl: "_CCCL_API"
    asc: "_ASC_AICORE_FN"
    kind: fn-qualifier
    status: mapped
    always_inject: true
    note: "设备/通用函数修饰符。CCCL 的 [[nodiscard]] _CCCL_API constexpr 对应 ASC 的 _ASC_AICORE_FN constexpr"
    source: ["examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "::cuda::std::"
    asc: "asc::std::"
    kind: qualified-name
    status: mapped
    always_inject: true
    note: "完全限定名前缀；裸 cuda::std:: 同样映射为 asc::std::"
    source: ["examples/headers/max.cccl.h", "examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "_CUDA_VSTD::"
    asc: "asc::std::"
    kind: qualified-name
    status: mapped
    always_inject: true
    note: "libcudacxx 内部把 _CUDA_VSTD 作为 cuda::std 命名空间别名使用；迁移后应显式写 asc::std::"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__algorithm/swap.h", "examples/headers/swap.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - cccl: "#include <cuda/std/...>"
    asc: '#include "asc/std/..."'
    kind: include-form
    status: mapped
    always_inject: true
    note: "尖括号系统头改为引号本地头；路径前缀 cuda/std -> asc/std（段替换 __cccl -> __asc 另见 segment_substitutions）"
    source: ["examples/headers/max.cccl.h", "examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "<cuda/std/detail/__config>"
    asc: '"asc/std/__config"'
    kind: include-form
    status: mapped
    always_inject: true
    note: "顶层 __config 头的固定映射"
    source: ["examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "<cuda/std/cstddef>"
    asc: "<cstddef>"
    kind: include-form
    status: mapped
    always_inject: true
    note: "CCCL 的 cuda/std/cstddef 在 ASC-STL 示例中落到标准 <cstddef>，用于 size_t 等基础类型"
    source: ["examples/headers/swap.cccl.h", "examples/headers/swap.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - cccl: "_CUDA_STD_<...>_H  (header guard)"
    asc: "ASC_STL_INCLUDE_ASC_STD_<...>_H_  (header guard)"
    kind: guard
    status: partial
    always_inject: true
    note: "header guard 不要手写，必须严格使用系统提供的 expected_header_guard（由 path_mapper 推导）"
    source: ["examples/headers/max.cccl.h", "examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "_CCCL_EXEC_CHECK_DISABLE"
    asc: "(删除)"
    kind: drop
    status: removed
    always_inject: true
    note: "CCCL 的 host/device 执行检查抑制宏；ASC-STL 无对应物，直接删除"
    source: ["examples/headers/max.cccl.h", "examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "#include <cuda/std/__cccl/prologue.h> / <cuda/std/__cccl/epilogue.h>"
    asc: "(删除)"
    kind: drop
    status: removed
    always_inject: true
    note: "CCCL 的 prologue/epilogue 配对包含；ASC-STL 不使用，删除"
    source: ["examples/headers/max.cccl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"
  - cccl: "_CCCL_IMPLICIT_SYSTEM_HEADER_* 的 #pragma system_header 块"
    asc: "(删除，改用 #if defined(__CCE__) #define ASC_DEVICE_CODE)"
    kind: drop
    status: removed
    always_inject: true
    note: "CCCL 的隐式系统头 pragma 块整体删除；设备代码分支用 __CCE__ 守卫"
    source: ["examples/headers/max.cccl.h", "examples/headers/max.accl.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"

# 源码符号隐含依赖。用于依赖图，不直接作为文本改写规则。
# 这类规则解决「源码里用了符号，但没有显式 include」的问题。
symbol_dependencies:
  - symbol: "_CUDA_VSTD::move"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "_CUDA_VSTD::move 在 libcudacxx 中由 __utility/move.h 提供；即使源头未显式 include，也应作为迁移闭包依赖"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__algorithm/swap.h", "repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - symbol: "cuda::std::move"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "显式 cuda::std::move 符号依赖 __utility/move.h"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - symbol: "::cuda::std::move"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "完全限定 ::cuda::std::move 符号依赖 __utility/move.h"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - symbol: "_CUDA_VSTD::move_if_noexcept"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "move_if_noexcept 与 move 同由 __utility/move.h 提供"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - symbol: "cuda::std::move_if_noexcept"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "显式 cuda::std::move_if_noexcept 符号依赖 __utility/move.h"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"
  - symbol: "::cuda::std::move_if_noexcept"
    header: "__utility/move.h"
    include: "cuda/std/__utility/move.h"
    kind: qualified-name
    status: mapped
    note: "完全限定 ::cuda::std::move_if_noexcept 符号依赖 __utility/move.h"
    source: ["repos/cccl/libcudacxx/include/cuda/std/__utility/move.h"]
    reviewed_by: agent
    reviewed_at: "2026-06-19"

# 路径段替换。Config.load() 会直接读取这里并写入运行时 config；
# path_mapper 据此把 cuda/std/__cccl/... 段改写为 asc/std/__asc/...。
segment_substitutions:
  - from: "__cccl"
    to: "__asc"
    source: ["reference/symbol_mapping.yaml runtime strategy"]
    reviewed_by: agent
    reviewed_at: "2026-06-15"

# 迁移策略。Config.load() 会直接读取这里并写入运行时 config；
# 修改策略时只改这里，不要在 settings.yaml/core/config.py 另建一份。
migration_policy:
  deferred_upstream_support_prefixes: ["__cccl/", "__internal/", "__support/", "detail/"]
  bootstrap_manual_coverage:
    "detail/__config": "__config"
  target_only_compatibility_wrappers: ["__algorithm/swap.h", "__numeric/gcd.h", "__numeric/lcm.h"]
  public_aggregation_headers: ["algorithm", "functional", "iterator", "numeric", "type_traits", "utility"]
  source: ["reference/symbol_mapping.yaml runtime strategy"]
  reviewed_by: agent
  reviewed_at: "2026-06-15"
