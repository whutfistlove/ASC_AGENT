name: CI

# 此前仓库没有任何 CI：210+ 离线单测与 selftest 全靠人手动跑。这里把它们变成
# push / PR 上的硬门禁（pytest + 离线 selftest 都不调模型、不需 CANN），lint 暂为建议性。

on:
  push:
    branches: [main, develop, "develop_*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run offline unit tests (no API key / no CANN)
        run: python -m pytest

      - name: Run offline selftest (mock model, end-to-end smoke)
        run: python main.py selftest

      - name: Lint (advisory — does not block)
        continue-on-error: true
        run: python -m ruff check .
