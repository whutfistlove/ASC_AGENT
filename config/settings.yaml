# ASC_agent（cccl-to-accl-v3）用户配置
# 只需覆盖你关心的字段，其余项自动回退到 core/config.py 的 DEFAULTS。
# 字符串里可用 ${ENV} 与 ${ENV:-默认值}；PROJECT_ROOT / HOME 已内置。

project:
  name: ASC_agent

paths:
  # 源仓库（CCCL）与目标仓库（ACCL）默认都放在项目内 repos/ 下，
  # 已把 mylearn 的 host/kernel 测试链路整合进项目，无需再依赖外部 mylearn。
  cccl_repo: "${CCCL_REPO:-${PROJECT_ROOT}/repos/cccl}"
  accl_repo: "${ACCL_REPO:-${PROJECT_ROOT}/repos/accl}"
  output_dir: outputs

mapping:
  source_repo_prefix: libcudacxx/include/cuda/std
  target_repo_prefix: asc-stl/include/asc/std
  # CCCL 侧测试树（平行于 include，贴近真实 libcudacxx）。算子头 <op>.h 对应的
  # 测试源约定为 <cccl_test_prefix>/<相同子路径>/<op><cccl_test_suffix>，
  # 用于「同步迁移测试代码」（见 core/test_migrator.py）。
  cccl_test_prefix: libcudacxx/test/libcudacxx/std
  cccl_test_suffix: .pass.cpp
  # 目录段重命名（v2 缺失这一步，导致 os.h 的 header guard 与示例对不上）
  segment_substitutions:
    - { from: __cccl, to: __asc }
  module_hint_fallback: generic

model:
  provider: zhipu          # zhipu | mock
  model_name: glm-5.1        # 可改成 glm-5.1 / glm-4.6 等
  api_key_env: ZHIPU_API_KEY
  # 官方 OpenAI 兼容接口（Bearer 鉴权）；可用环境变量 ZHIPU_BASE_URL 覆盖
  base_url: "${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4/chat/completions}"
  temperature: 0.6
  max_tokens: 65536
  # 开启扩展思考：迁移/修复是需要分步推理的硬任务，强制纯 JSON 会把推理压没。
  # 请求体加 {"thinking": {"type": "enabled"}}，流式时 reasoning_content 单独回显、
  # 只把正式 content 累积为返回值，故返回仍是干净 JSON（见 model_client._generate_stream）。
  thinking: true
  response_format_json: true
  stream: true             # 流式调用；配合 --show-model-io 可实时逐字回显
  # P1：测试反馈修复时是否允许模型调用取证/自检工具（read_repo_file / grep_repo /
  # host_syntax_check / extract_error_lines）。默认关闭以保持既有行为；置 true 后
  # 模型可先调查再产出修复，单次成功率更高。max_tool_rounds 限制每次最多工具轮数。
  tools_enabled: true
  max_tool_rounds: 4
  # best-of-N：一次采样多个候选，用便宜的校验器（头文件结构 / host 测试 g++ 自检）择优。
  # 1=单发（默认，行为不变）；>1 提升一次成功率，但模型调用数成倍增加。
  draft_samples: 1

# few-shot 检索：按算子相关度从 examples/ 选最贴近的示例（示例库越大越受益）。
few_shot:
  retrieval: true          # 关掉则回退到 examples 配置顺序
  top_k: 2

repo_verify:
  # 留空则自动探测 conda.sh；也可显式写绝对路径
  conda_sh: "${CONDA_SH:-}"
  conda_env: accl
  clang_format_bin: clang-format    # 不再写死 clang-format-14
  push_remote: origin
  base_branch: develop
  branch_prefix: feature/ai
  commit_message_template: "add {filename}"
  sign_off: true
  only_add_target_file: true
  require_clean_worktree: true
  # hook 检查文案可配置；换 hook / 换文案时改这里即可，不必动 Python
  checks:
    - name: license
      pattern: "Add Apache 2\\.0 license header.*Passed"
      required: true
    - name: style
      pattern: "CANN code style check \\(clang-format \\+ cpplint\\).*Passed"
      required: true

retry:
  max_fix_rounds: 5

tests:
  # 本机 CANN (cann-9.0.0) 支持 Ascend950PR_9599；合并 develop_jzy 时引入的
  # Ascend910_9599 在本机不被支持（CMake host_config 报 "does not support"）。
  kernel_soc_version: Ascend950PR_9599
  kernel_cannsim_soc_version: Ascend950

examples:
  example_1:
    cccl: "${PROJECT_ROOT}/examples/headers/max.cccl.h"
    accl: "${PROJECT_ROOT}/examples/headers/max.accl.h"
  example_2:
    cccl: "${PROJECT_ROOT}/examples/headers/os.cccl.h"
    accl: "${PROJECT_ROOT}/examples/headers/os.accl.h"

# 测试迁移的少样本示例对（CCCL 测试 -> ACCL host 测试 + kernel_spec）。
# example_1 覆盖二元返回值(max)，example_2 覆盖原地 void(swap) —— 各教一种算子形态。
test_examples:
  example_1:
    cccl_test: "${PROJECT_ROOT}/examples/tests/max.cccl.pass.cpp"
    accl_host: "${PROJECT_ROOT}/examples/tests/max.accl_host.cpp"
    accl_kernel_spec: "${PROJECT_ROOT}/examples/tests/max.accl_kernel_spec.json"
  example_2:
    cccl_test: "${PROJECT_ROOT}/examples/tests/swap.cccl.pass.cpp"
    accl_host: "${PROJECT_ROOT}/examples/tests/swap.accl_host.cpp"
    accl_kernel_spec: "${PROJECT_ROOT}/examples/tests/swap.accl_kernel_spec.json"

normalize:
  fix_directive_spacing: true
  ensure_trailing_newline: true

# 迁移策略（单一事实源；不写则用 core/config.py 的内置默认）。整组覆盖某项即可，
# 例如想把某前缀纳入/移出「延期」范围、或新增手写 bootstrap 头时改这里，无需动 Python。
# migration_policy:
#   deferred_upstream_support_prefixes: ["__cccl/", "__internal/", "__support/", "detail/"]
#   bootstrap_manual_coverage: { "detail/__config": "__config" }
#   target_only_compatibility_wrappers: ["__algorithm/swap.h", "__numeric/gcd.h", "__numeric/lcm.h"]
#   public_aggregation_headers: ["algorithm", "functional", "iterator", "numeric", "type_traits", "utility"]
