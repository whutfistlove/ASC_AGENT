# 真实批量迁移清单（指向项目内置的 CCCL 源仓库 repos/cccl）。
# inputs 里每个路径都必须落在 mapping.source_repo_prefix（libcudacxx/include/cuda/std）之下。
#
# 用法示例：
#   python main.py batch --manifest config/batch_manifest.yaml --mock
#   python main.py batch --manifest config/batch_manifest.yaml          # 真实模型 + git 提交检查
inputs:
  - "repos/cccl/libcudacxx/include/cuda/std/__cccl/os.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/min.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/max.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/swap.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/clamp.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/quad_fanout.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/sort3.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__algorithm/minmax.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/gcd.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/lcm.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/midpoint.h"
  # 依赖闭包测试用例（叶子优先）：batch 是单文件迁移，依赖须排在被依赖者之后；
  # 真正的闭包自动排序见 `python main.py dependency-convert --entry-header __numeric/spread3.h`。
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/abs_diff.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/range_width.h"
  - "repos/cccl/libcudacxx/include/cuda/std/__numeric/spread3.h"
