repos:
  # Hook 1: 自动添加版权头（只处理 staged 新文件）
  - repo: local
    hooks:
      - id: add-license-header
        name: Add Apache 2.0 license header
        entry: python3 scripts/add_license_header.py
        language: system
        files: \.(cpp|cc|cxx|h|hpp|cuh|py|sh|cmake)$|^CMakeLists\.txt$
        stages: [pre-commit]

  # Hook 2: CANN 风格检查（格式 + lint）
  - repo: local
    hooks:
      - id: cann-style-check
        name: CANN code style check (clang-format + cpplint)
        entry: ./scripts/check-style.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]